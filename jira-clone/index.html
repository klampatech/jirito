<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Jira</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="topnav">
    <div class="topnav-left">
      <div class="logo">📋 Little Jira</div>
      <span class="project-name">Project Alpha</span>
    </div>
    <div class="topnav-right">
      <input type="text" class="search-input" id="search-input" placeholder="Search...">
      <button class="btn btn-primary" id="add-issue-btn">+ Create</button>
      <div class="avatar">K</div>
    </div>
  </nav>

  <!-- Board Header -->
  <div class="board-header">
    <h1 id="board-title">Board</h1>
    <div class="board-actions">
      <div class="filter-group">
        <select class="filter-select" id="filter-type">
          <option value="all">All Types</option>
          <option value="story">Stories</option>
          <option value="bug">Bugs</option>
          <option value="task">Tasks</option>
          <option value="epic">Epics</option>
        </select>
        <select class="filter-select" id="filter-priority">
          <option value="all">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="filter-select" id="filter-assignee">
          <option value="all">All Assignees</option>
        </select>
      </div>
      <button class="btn btn-secondary" id="toggle-sidebar">☰ Sidebar</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">Projects</h3>
      <div class="project-list" id="project-list"></div>
      <button class="btn btn-secondary btn-sm btn-full" id="add-project-btn">+ New Project</button>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">Views</h3>
      <div class="view-list" id="view-list"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">Saved Filters</h3>
      <div class="saved-filters" id="saved-filters"></div>
      <button class="btn btn-secondary btn-sm btn-full" id="save-filter-btn">💾 Save Current Filter</button>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">Activity</h3>
      <div class="activity-feed" id="activity-feed"></div>
    </div>
  </div>

  <!-- Kanban Board -->
  <div class="app-layout" id="app-layout">
    <div class="board" id="board">
    <!-- To Do Column -->
    <div class="column" data-status="todo">
      <div class="column-header">
        <div class="column-title">
          <span class="status-dot todo"></span>
          <span>To Do</span>
          <span class="count" data-count-for="todo">0</span>
        </div>
        <button class="btn-icon">⋯</button>
      </div>
      <div class="column-body" data-status="todo"></div>
      <div class="column-footer">
        <button class="btn-add-card" data-status="todo">+ Add card</button>
      </div>
    </div>

    <!-- In Progress Column -->
    <div class="column" data-status="inprogress">
      <div class="column-header">
        <div class="column-title">
          <span class="status-dot inprogress"></span>
          <span>In Progress</span>
          <span class="count" data-count-for="inprogress">0</span>
        </div>
        <button class="btn-icon">⋯</button>
      </div>
      <div class="column-body" data-status="inprogress"></div>
      <div class="column-footer">
        <button class="btn-add-card" data-status="inprogress">+ Add card</button>
      </div>
    </div>

    <!-- In Review Column -->
    <div class="column" data-status="review">
      <div class="column-header">
        <div class="column-title">
          <span class="status-dot review"></span>
          <span>In Review</span>
          <span class="count" data-count-for="review">0</span>
        </div>
        <button class="btn-icon">⋯</button>
      </div>
      <div class="column-body" data-status="review"></div>
      <div class="column-footer">
        <button class="btn-add-card" data-status="review">+ Add card</button>
      </div>
    </div>

    <!-- Done Column -->
    <div class="column" data-status="done">
      <div class="column-header">
        <div class="column-title">
          <span class="status-dot done"></span>
          <span>Done</span>
          <span class="count" data-count-for="done">0</span>
        </div>
        <button class="btn-icon">⋯</button>
      </div>
      <div class="column-body" data-status="done"></div>
      <div class="column-footer">
        <button class="btn-add-card" data-status="done">+ Add card</button>
      </div>
    </div>
  </div>
  </div>

  <!-- Issue Detail Panel -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-panel-header">
      <h2 id="detail-title">Issue Details</h2>
      <button class="btn-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-panel-body" id="detail-body">
      <!-- Filled dynamically -->
    </div>
    <div class="detail-status-bar" id="detail-status-bar">
      <!-- Status buttons filled dynamically -->
    </div>
  </div>

  <!-- Create Issue Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Create Issue</h2>
        <button class="btn-close" id="modal-close">&times;</button>
      </div>
      <form id="issue-form">
        <div class="form-group">
          <label for="issue-title">Summary</label>
          <input type="text" id="issue-title" required placeholder="Brief summary of the issue">
        </div>
        <div class="form-group">
          <label for="issue-desc">Description</label>
          <textarea id="issue-desc" rows="4" placeholder="Add a detailed description..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="issue-type">Type</label>
            <select id="issue-type">
              <option value="story">Story</option>
              <option value="bug">Bug</option>
              <option value="task">Task</option>
              <option value="epic">Epic</option>
            </select>
          </div>
          <div class="form-group">
            <label for="issue-priority">Priority</label>
            <select id="issue-priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="issue-assignee">Assignee</label>
          <input type="text" id="issue-assignee" placeholder="Unassigned">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="project-modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>New Project</h2>
        <button class="btn-close" id="project-modal-close">&times;</button>
      </div>
      <form id="project-form">
        <div class="form-group">
          <label for="project-name">Project Name</label>
          <input type="text" id="project-name" required placeholder="e.g. Project Phoenix">
        </div>
        <div class="form-group">
          <label for="project-key">Project Key</label>
          <input type="text" id="project-key" required placeholder="e.g. PHX" maxlength="5">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="project-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
